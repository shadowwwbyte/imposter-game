name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ─── 1. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: cd frontend && npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─── 2. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync backend to EC2
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.git' \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/imposter-game/backend/

      - name: Sync frontend dist to EC2
        run: |
          rsync -avz --delete \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/imposter-game/frontend/dist/

      - name: Install dependencies & restart
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "=== Installing backend dependencies ==="
            cd /var/www/imposter-game/backend
            npm ci --omit=dev

            echo "=== Restarting backend ==="
            pm2 restart imposter-backend --update-env || \
              pm2 start src/index.js \
                --name imposter-backend \
                --max-memory-restart 300M \
                --restart-delay 3000 \
                --max-restarts 10

            pm2 save

            echo "=== Reloading Nginx ==="
            sudo systemctl reload nginx

            echo "=== Done ==="
            pm2 status
          ENDSSH

      - name: Health check
        run: |
          sleep 8
          curl --fail --silent --max-time 15 http://${{ secrets.EC2_HOST }}/health \
            && echo "✅ Health check passed" \
            || (echo "❌ Health check failed" && exit 1)
