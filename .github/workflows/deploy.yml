name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "=== Pulling latest code ==="
            cd /var/www/imposter-game
            git pull origin main

            echo "=== Installing backend dependencies ==="
            cd /var/www/imposter-game/backend
            npm ci --omit=dev

            echo "=== Building frontend ==="
            cd /var/www/imposter-game/frontend
            npm ci
            VITE_API_URL=http://3.27.150.233/api \
            VITE_WS_URL=http://3.27.150.233 \
            npm run build

            echo "=== Restarting backend ==="
            pm2 restart imposter-backend --update-env || \
              pm2 start /var/www/imposter-game/backend/src/index.js \
                --name imposter-backend \
                --max-memory-restart 300M \
                --restart-delay 3000 \
                --max-restarts 10

            pm2 save

            echo "=== Reloading Nginx ==="
            sudo systemctl reload nginx

            echo "=== Deploy complete ==="
            pm2 status
          ENDSSH

      - name: Health check
        run: |
          sleep 8
          curl --fail --silent --max-time 15 http://${{ secrets.EC2_HOST }}/health \
            && echo "✅ Health check passed" \
            || (echo "❌ Health check failed" && exit 1)
