name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ─── 1. Test & Build ──────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # Backend
      - name: Install backend dependencies
        run: cd backend && npm ci

      # Frontend
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: cd frontend && npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─── 2. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── Sync backend source ──
      - name: Sync backend to EC2
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.git' \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/imposter-game/backend/

      # ── Sync frontend build ──
      - name: Sync frontend dist to EC2
        run: |
          rsync -avz --delete \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/imposter-game/frontend/dist/

      # ── Install dependencies & restart ──
      - name: Install dependencies & restart services
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            echo "=== Installing backend dependencies ==="
            cd /var/www/imposter-game/backend
            npm ci --only=production

            echo "=== Running DB migrations (if any) ==="
            # psql $DATABASE_URL -f src/models/schema.sql 2>/dev/null || true

            echo "=== Restarting backend with PM2 ==="
            pm2 restart imposter-backend --update-env || \
              pm2 start src/index.js \
                --name imposter-backend \
                --env production \
                --max-memory-restart 512M \
                --restart-delay 3000 \
                --max-restarts 10

            pm2 save

            echo "=== Reloading Nginx ==="
            sudo nginx -t && sudo systemctl reload nginx

            echo "=== Deploy complete! ==="
            pm2 status
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          curl --fail --silent --max-time 10 \
            http://${{ secrets.EC2_HOST }}/health || \
            (echo "Health check failed!" && exit 1)

      - name: Notify success
        if: success()
        run: echo "✅ Deployment successful to ${{ secrets.EC2_HOST }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed!"
